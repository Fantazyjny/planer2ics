<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planer2ICS - Konwerter Akcji Plemion</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --container-bg: #242424;
            --accent-color: #ff9f43;
            --text-color: #eeeeee;
            --text-muted: #a0a0a0;
            --border-color: #3d3d3d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            /* Zmniejszony margines na telefonach */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* Na mobile lepiej żeby apka zaczynała się od góry */
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            padding: 20px;
            /* Mniejszy padding dla większej ilości miejsca na treść */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 650px;
            border: 1px solid var(--border-color);
            margin-top: 10px;
        }

        h1 {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 22px;
            /* Dostosowany nagłówek */
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            text-align: center;
        }

        p.description {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 15px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #111;
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 16px;
            /* 16px blokuje auto-zoom na urządzeniach z iOS! */
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .options-group {
            background-color: #1c1c1c;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .options-group>label {
            margin-bottom: 15px;
        }

        .option-item {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            /* Pozwala elementom przenieść się do nowej linii na bardzo wąskich ekranach */
            margin-bottom: 15px;
            gap: 10px;
            /* Równe odstępy */
        }

        .option-item:last-child {
            margin-bottom: 0;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option-item input[type="checkbox"] {
            margin: 0;
            width: 22px;
            /* Większy kwadracik, łatwiejszy do trafienia palcem */
            height: 22px;
            cursor: pointer;
            accent-color: var(--accent-color);
            /* Zmiana koloru natywnego checkboxa w nowych przeglądarkach */
        }

        .alarm-label {
            display: inline-block;
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
        }

        .option-item select {
            background-color: #333;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 0 10px;
            border-radius: 6px;
            cursor: pointer;
            flex-grow: 1;
            width: 100%;
            min-width: 150px;
            height: 44px;
            /* Optymalna wysokość przycisku dla ekranów dotykowych (wytyczne Apple) */
            font-size: 16px;
            /* Blokuje auto-zoom na iOS! */
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #1a1a1a;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        button:hover,
        button:active {
            background-color: #e08b35;
            transform: translateY(1px);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Dodatkowe ulepszenia tylko dla małych ekranów (np. telefony pionowo) */
        @media (max-width: 480px) {
            .option-item {
                flex-direction: column;
                align-items: stretch;
            }

            .checkbox-wrapper {
                margin-bottom: 5px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>⚔️ Planer2ICS</h1>
        <p class="description">Wklej kod BBCode wygenerowany przez planer ataków (z datami i linkami), ustaw
            powiadomienia i wygeneruj plik .ics z pełnymi okienkami akcji.</p>

        <label for="rawData">Kod BBCode z planera:</label>
        <textarea id="rawData" placeholder="Wklej tutaj tekst rozpiski..."></textarea>

        <div class="options-group">
            <label>Ustawienia powiadomień (wybierz do 3 alertów):</label>

            <div class="option-item">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="useAlarm1" checked>
                    <span class="alarm-label">Alarm 1:</span>
                </div>
                <select id="alarmOffset1">
                    <option value="60">1 godzina przed</option>
                    <option value="30">30 minut przed</option>
                    <option value="15">15 minut przed</option>
                    <option value="10">10 minut przed</option>
                    <option value="5" selected>5 minut przed</option>
                    <option value="2">2 minuty przed</option>
                    <option value="1">1 minutę przed</option>
                    <option value="0">Dokładnie o czasie (0 min)</option>
                </select>
            </div>

            <div class="option-item">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="useAlarm2">
                    <span class="alarm-label">Alarm 2:</span>
                </div>
                <select id="alarmOffset2">
                    <option value="60">1 godzina przed</option>
                    <option value="30">30 minut przed</option>
                    <option value="15">15 minut przed</option>
                    <option value="10">10 minut przed</option>
                    <option value="5">5 minut przed</option>
                    <option value="2">2 minuty przed</option>
                    <option value="1" selected>1 minutę przed</option>
                    <option value="0">Dokładnie o czasie (0 min)</option>
                </select>
            </div>

            <div class="option-item">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="useAlarm3">
                    <span class="alarm-label">Alarm 3:</span>
                </div>
                <select id="alarmOffset3">
                    <option value="60">1 godzina przed</option>
                    <option value="30">30 minut przed</option>
                    <option value="15">15 minut przed</option>
                    <option value="10">10 minut przed</option>
                    <option value="5">5 minut przed</option>
                    <option value="2">2 minuty przed</option>
                    <option value="1">1 minutę przed</option>
                    <option value="0" selected>Dokładnie o czasie (0 min)</option>
                </select>
            </div>

        </div>

        <button onclick="processPlanerData()">Generuj plik kalendarza</button>

        <div class="footer">
            Wszystko przetwarzane jest lokalnie w Twojej przeglądarce.
        </div>
    </div>

    <script>
        function parseDateToICS(dateStr, timeStr) {
            const normalizedDateStr = dateStr.replace(/-/g, '/');
            const localDate = new Date(`${normalizedDateStr} ${timeStr}`);

            if (isNaN(localDate.getTime())) return null;

            const pad = (n) => String(n).padStart(2, '0');

            return `${localDate.getUTCFullYear()}${pad(localDate.getUTCMonth() + 1)}${pad(localDate.getUTCDate())}T${pad(localDate.getUTCHours())}${pad(localDate.getUTCMinutes())}${pad(localDate.getUTCSeconds())}Z`;
        }

        function processPlanerData() {
            const text = document.getElementById('rawData').value;

            // Pobieranie aktywnych alertów
            const activeAlarms = [];
            if (document.getElementById('useAlarm1').checked) activeAlarms.push(document.getElementById('alarmOffset1').value);
            if (document.getElementById('useAlarm2').checked) activeAlarms.push(document.getElementById('alarmOffset2').value);
            if (document.getElementById('useAlarm3').checked) activeAlarms.push(document.getElementById('alarmOffset3').value);

            if (!text.trim()) {
                alert('Wklej najpierw kod rozpiski!');
                return;
            }

            // Dzielimy tekst na bloki pojedynczych ataków za pomocą numeracji "X. [b]"
            const attackBlocks = text.split(/(?=\d+\.\s+\[b\])/);

            let icsEvents = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//Planer2ICS//PL",
                "CALSCALE:GREGORIAN",
                "METHOD:PUBLISH"
            ];

            let eventCount = 0;

            attackBlocks.forEach((block, index) => {
                if (!block.trim() || !block.includes('->')) return;

                // 1. Wyciąganie typu rozkazu i wojska
                const orderMatch = block.match(/Wyślij\s+([^\]]+\]|FEJK|OFF|SZLACHCIC|WSPARCIE)/i);
                let orderType = orderMatch ? orderMatch[1] : "Atak";

                // Ustalanie emotki na podstawie typu rozkazu
                let emoji = "⚔️";
                const typeUpper = orderType.toUpperCase();

                if (typeUpper.includes("SZLACHCIC")) {
                    emoji = "👑";
                } else if (typeUpper.includes("BURZAK")) {
                    emoji = "💣";
                } else if (typeUpper.includes("FEJK")) {
                    emoji = "🤡";
                } else if (typeUpper.includes("WSPARCIE")) {
                    emoji = "🛡️";
                }

                // 2. Wyciąganie daty oraz czasu startu i końca okienka
                const dateTimeMatch = block.match(/(\d{4}-\d{2}-\d{2})\s+(?:\[color=[^\]]+\])?(\d{2}:\d{2}:\d{2})\s*-\s*(\d{2}:\d{2}:\d{2})/);

                // 3. Wyciąganie koordynatów
                const coordsMatch = block.match(/(\d{3}\|\d{3})\s*(?:\[b\])?->(?:\[\/b\])?\s*(\d{3}\|\d{3})/);

                // 4. Wyciąganie bezpośredniego linku do placu
                const urlMatch = block.match(/\[url=(https:\/\/[^\]]+)\]/);

                if (dateTimeMatch && coordsMatch) {
                    const dateStr = dateTimeMatch[1];
                    const startTimeStr = dateTimeMatch[2];
                    const endTimeStr = dateTimeMatch[3];

                    const icsStartTimestamp = parseDateToICS(dateStr, startTimeStr);
                    const icsEndTimestamp = parseDateToICS(dateStr, endTimeStr);

                    if (!icsStartTimestamp || !icsEndTimestamp) return;

                    eventCount++;
                    const sourceCoords = coordsMatch[1];
                    const targetCoords = coordsMatch[2];
                    const gameUrl = urlMatch ? urlMatch[1] : '';

                    const uid = `p2ics-${Date.now()}-${index}@planer`;

                    const summary = `${emoji} ${orderType} (${sourceCoords} -> ${targetCoords})`;

                    let description = `Koordynaty: ${sourceCoords} -> ${targetCoords}\\n`;
                    if (gameUrl) {
                        description += `LINK DO PLACU: ${gameUrl}\\n\\n`;
                    }

                    description += `Pełny tekst rozkazu:\\n${block.replace(/\[\/?[^\]]+\]/g, '').replace(/[\r\n]+/g, ' ').trim()}`;
                    description = description.replace(/[,;]/g, '\\$&');

                    icsEvents.push("BEGIN:VEVENT");
                    icsEvents.push(`UID:${uid}`);
                    icsEvents.push(`DTSTAMP:${icsStartTimestamp}`);
                    icsEvents.push(`DTSTART:${icsStartTimestamp}`);
                    icsEvents.push(`DTEND:${icsEndTimestamp}`);
                    icsEvents.push(`SUMMARY:${summary}`);
                    icsEvents.push(`DESCRIPTION:${description}`);
                    if (gameUrl) {
                        icsEvents.push(`URL:${gameUrl}`);
                    }
                    icsEvents.push(`STATUS:CONFIRMED`);

                    // Pętla dodająca wszystkie wybrane alerty
                    activeAlarms.forEach(offset => {
                        icsEvents.push("BEGIN:VALARM");
                        icsEvents.push(`TRIGGER:-PT${offset}M`);
                        icsEvents.push("ACTION:DISPLAY");
                        icsEvents.push(`DESCRIPTION:Otwiera się okienko na ${orderType}!`);
                        icsEvents.push("END:VALARM");
                    });

                    icsEvents.push("END:VEVENT");
                }
            });

            icsEvents.push("END:VCALENDAR");

            if (eventCount === 0) {
                alert('Nie udało się dopasować struktury ataków. Upewnij się, że wklejasz pełną rozpiskę.');
                return;
            }

            const finalIcs = icsEvents.join('\r\n');
            const blob = new Blob([finalIcs], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `planer2ics_${Date.now()}.ics`;

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

</body>

</html>
